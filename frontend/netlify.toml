[build]
  # The directory where the build command should run
  base = "frontend"

  # The command to run to build your project
  command = "npm run build"

  # The directory that Netlify will deploy (relative to base)
  publish = "dist"

[build.environment]
  # Recommended Node version for Vite
  NODE_VERSION = "20"
  # Ensure all dependencies are installed
  NODE_ENV = "development"

[[redirects]]
  # Basic SPA redirect for React Router
  from = "/*"
  to = "/index.html"
  status = 200
